version: '3.8'

services:
  backend:
    build: .
    container_name: crescix_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - USE_MOCK_DB=${USE_MOCK_DB:-false}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-crescix}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      # ── Aumenta o heap do Node.js para evitar "out of memory" ──────────────
      - NODE_OPTIONS=--max-old-space-size=512
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src   # hot reload do nodemon funciona sem rebuild
    # ── Limite de memória do container ─────────────────────────────────────────
    mem_limit: 768m
    memswap_limit: 768m

  postgres:
    image: postgres:15-alpine
    container_name: crescix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-crescix}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    # ── Health check: só sobe o backend quando o Postgres estiver pronto ───────
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-crescix}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 256m
    memswap_limit: 256m